[project]
name = "bird-data"
version = "0.1.0"
requires-python = ">=3.11,<3.12"
dependencies = [
    "pydantic>=2.0",
    "bird-core",
]

[tool.uv.sources]
bird-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bird_data"]
