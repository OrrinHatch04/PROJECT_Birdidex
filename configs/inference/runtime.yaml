# Inference runtime configuration for the cyberdeck.
# TODO: Profile on target hardware and adjust thresholds.

models:
  detector: "models/exports/detector.onnx"
  classifier: "models/exports/classifier.onnx"
  label_map: "models/exports/label_map.json"

camera:
  device_index: 0
  width: 1280
  height: 720
  fps: 30

inference:
  detector_confidence_threshold: 0.5
  classifier_top_k: 5
  classifier_confidence_threshold: 0.3
  # Run inference every N frames (skip frames to reduce CPU load)
  inference_every_n_frames: 5

display:
  show_bounding_boxes: true
  show_confidence: true
