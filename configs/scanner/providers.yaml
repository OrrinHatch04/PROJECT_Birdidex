# Metadata provider configuration.
# Commands do not make provider requests unless explicitly run with --live.

providers:
  inaturalist:
    enabled: true
    base_url: "https://api.inaturalist.org/v1"
    rate_limit_per_second: 1
    quality_grade: "research"
    max_records: 25

  ala:
    enabled: true
    base_url: "https://biocache-ws.ala.org.au/ws"
    rate_limit_per_second: 1
    max_records: 25

  gbif:
    enabled: true
    base_url: "https://api.gbif.org/v1"
    rate_limit_per_second: 1
    max_records: 25

  wikimedia_commons:
    enabled: true
    base_url: "https://commons.wikimedia.org/w/api.php"
    rate_limit_per_second: 1
    max_records: 25

  openverse:
    enabled: true
    base_url: "https://api.openverse.engineering/v1/images/"
    rate_limit_per_second: 1
    max_records: 25

optional_runtime_config:
  ebird_api_key: "BIRDIDEX_EBIRD_API_KEY"
  search_api_key: "BIRDIDEX_SEARCH_API_KEY"
