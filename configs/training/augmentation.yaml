# Image augmentation configuration for training.
# Applied via albumentations pipeline.
# TODO: Tune probabilities based on dataset distribution analysis.

augmentation:
  horizontal_flip: true
  vertical_flip: false
  random_rotation_degrees: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
  random_crop: true
  blur_probability: 0.1
  gaussian_noise_probability: 0.1
  normalize:
    mean: [0.485, 0.456, 0.406]  # ImageNet statistics
    std: [0.229, 0.224, 0.225]
