# ROI configuration for the SEQ / Bundaberg-to-Goondiwindi region.
# The GeoJSON polygon below is APPROXIMATE — review before using configured providers.

name: "SEQ_Bundaberg_Goondiwindi_ROI"

# Path to the GeoJSON polygon file (relative to repo root).
geojson_path: "configs/roi/roi.example.geojson"

# Optional: path to pre-exported WKT (generated by scripts/dataset/00_build_roi.py).
# wkt_path: "data/roi/roi.wkt"

anchor_places:
  - Brisbane
  - Gympie
  - Sunshine Coast
  - Toowoomba
  - Warwick
  - Bundaberg
  - Goondiwindi

# Buffer added to the ROI polygon for boundary occurrence queries (km).
buffer_km: 50
